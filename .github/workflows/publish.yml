name: Publish to GitHub Packages

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com

      - name: Export GitHub Packages token
        run: |
          echo "GH_PACKAGES_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}" >> "$GITHUB_ENV"
          echo "NODE_AUTH_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}" >> "$GITHUB_ENV"

      - run: npm ci

      - run: npm run build
        env:
          # Required repository variables — enforced by scripts/assert-org-url.mjs (CI: env only; local: merge with playground/.env)
          ORG_DOMAIN: ${{ vars.DOMAIN_NAME }}
          ORG_GITHUB_SPONSOR_BUTTON_URL: ${{ vars.ORG_GITHUB_SPONSOR_BUTTON_URL }}
          ORG_GITHUB_URL: ${{ vars.ORG_GITHUB_URL }}
          ORG_PYPI_URL: ${{ vars.ORG_PYPI_URL }}
          ORG_LINKEDIN_URL: ${{ vars.ORG_LINKEDIN_URL }}
          ORG_X_URL: ${{ vars.ORG_X_URL }}
          ORG_MASTODON_URL: ${{ vars.ORG_MASTODON_URL }}
          ORG_YOUTUBE_URL: ${{ vars.ORG_YOUTUBE_URL }}
          ORG_SPOTIFY_URL: ${{ vars.ORG_SPOTIFY_URL }}
          ORG_DISCORD_URL: ${{ vars.ORG_DISCORD_URL }}
          ORG_TIPEEE_URL: ${{ vars.ORG_TIPEEE_URL }}
          CONTACT_EMAIL: ${{ vars.CONTACT_EMAIL }}
          HTMT_FRONT_SUBDOMAIN: ${{ vars.HTMT_FRONT_SUBDOMAIN }}
          HTMT_API_SUBDOMAIN: ${{ vars.HTMT_API_SUBDOMAIN }}
          GTMT_FRONT_SUBDOMAIN: ${{ vars.GTMT_FRONT_SUBDOMAIN }}
          GTMT_API_SUBDOMAIN: ${{ vars.GTMT_API_SUBDOMAIN }}
          AUDIOMETA_FRONT_SUBDOMAIN: ${{ vars.AUDIOMETA_FRONT_SUBDOMAIN }}
          AUDIOMETA_API_SUBDOMAIN: ${{ vars.AUDIOMETA_API_SUBDOMAIN }}
          TMTA_SUBDOMAIN: ${{ vars.TMTA_SUBDOMAIN }}
          TMD_GAME_SUBDOMAIN: ${{ vars.TMD_GAME_SUBDOMAIN }}
          TMD_SHOWCASE_SUBDOMAIN: ${{ vars.TMD_SHOWCASE_SUBDOMAIN }}

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
