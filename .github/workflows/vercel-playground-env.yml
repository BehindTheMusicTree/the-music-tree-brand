# Syncs GitHub repository variables to the Vercel project used for `playground/`.
# Runs only via workflow_dispatch (Actions → Sync playground env to Vercel → Run workflow).
#
# Configure in the repo:
#   Secrets:  VERCEL_TOKEN — Vercel token with project env access
#             GH_PACKAGES_TOKEN — GitHub Packages token for npm auth in playground builds
#   Variables: VERCEL_PROJECT_ID — Vercel project id (e.g. prj_…)
#   Optional variables: VERCEL_TEAM_ID — required when the project lives under a Vercel team
#
# Same keys as `publish.yml` / `scripts/assert-org-url.mjs`. ORG_DOMAIN is set from DOMAIN_NAME.

name: Sync playground env to Vercel

on:
  workflow_dispatch:

concurrency:
  group: vercel-playground-env
  cancel-in-progress: true

jobs:
  sync:
    if: github.repository == 'BehindTheMusicTree/organization-assets'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
      ORG_DOMAIN: ${{ vars.DOMAIN_NAME }}
      ORG_NAME: ${{ vars.ORG_NAME }}
      ORG_GITHUB_SPONSOR_BUTTON_URL: ${{ vars.ORG_GITHUB_SPONSOR_BUTTON_URL }}
      ORG_GITHUB_URL: ${{ vars.ORG_GITHUB_URL }}
      ORG_PYPI_URL: ${{ vars.ORG_PYPI_URL }}
      ORG_LINKEDIN_URL: ${{ vars.ORG_LINKEDIN_URL }}
      ORG_X_URL: ${{ vars.ORG_X_URL }}
      ORG_MASTODON_URL: ${{ vars.ORG_MASTODON_URL }}
      ORG_YOUTUBE_URL: ${{ vars.ORG_YOUTUBE_URL }}
      ORG_SPOTIFY_URL: ${{ vars.ORG_SPOTIFY_URL }}
      ORG_DISCORD_URL: ${{ vars.ORG_DISCORD_URL }}
      ORG_TIPEEE_URL: ${{ vars.ORG_TIPEEE_URL }}
      CONTACT_EMAIL: ${{ vars.CONTACT_EMAIL }}
      HTMT_FRONT_SUBDOMAIN: ${{ vars.HTMT_FRONT_SUBDOMAIN }}
      HTMT_API_SUBDOMAIN: ${{ vars.HTMT_API_SUBDOMAIN }}
      GTMT_FRONT_SUBDOMAIN: ${{ vars.GTMT_FRONT_SUBDOMAIN }}
      GTMT_API_SUBDOMAIN: ${{ vars.GTMT_API_SUBDOMAIN }}
      AUDIOMETA_FRONT_SUBDOMAIN: ${{ vars.AUDIOMETA_FRONT_SUBDOMAIN }}
      AUDIOMETA_API_SUBDOMAIN: ${{ vars.AUDIOMETA_API_SUBDOMAIN }}
      TMTA_SUBDOMAIN: ${{ vars.TMTA_SUBDOMAIN }}
      TMD_GAME_SUBDOMAIN: ${{ vars.TMD_GAME_SUBDOMAIN }}
      TMD_SHOWCASE_SUBDOMAIN: ${{ vars.TMD_SHOWCASE_SUBDOMAIN }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Validate required variables
        run: |
          missing=()
          for var in VERCEL_TOKEN GH_PACKAGES_TOKEN VERCEL_PROJECT_ID \
                     ORG_DOMAIN ORG_GITHUB_SPONSOR_BUTTON_URL ORG_GITHUB_URL \
                     ORG_PYPI_URL ORG_LINKEDIN_URL ORG_X_URL ORG_MASTODON_URL \
                     ORG_YOUTUBE_URL ORG_SPOTIFY_URL ORG_DISCORD_URL ORG_TIPEEE_URL \
                     CONTACT_EMAIL HTMT_FRONT_SUBDOMAIN HTMT_API_SUBDOMAIN GTMT_FRONT_SUBDOMAIN GTMT_API_SUBDOMAIN \
                     AUDIOMETA_FRONT_SUBDOMAIN AUDIOMETA_API_SUBDOMAIN TMTA_SUBDOMAIN TMD_GAME_SUBDOMAIN \
                     TMD_SHOWCASE_SUBDOMAIN; do
            [[ -z "${!var}" ]] && missing+=("$var")
          done
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing required variables: ${missing[*]}"
            exit 1
          fi

      - name: Upsert env on Vercel project
        run: node scripts/sync-vercel-playground-env.mjs
